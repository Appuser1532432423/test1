name: Test actions/checkout versions

on:
  workflow_dispatch:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  test-checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout v1
        id: v1
        continue-on-error: true
        uses: actions/checkout@v1

      - name: Result v1
        if: always()
        run: echo "v1,${{ steps.v1.outcome }}" >> results.csv

      - name: Checkout v2
        id: v2
        continue-on-error: true
        uses: actions/checkout@v2

      - name: Result v2
        if: always()
        run: echo "v2,${{ steps.v2.outcome }}" >> results.csv

      - name: Checkout v3
        id: v3
        continue-on-error: true
        uses: actions/checkout@v3

      - name: Result v3
        if: always()
        run: echo "v3,${{ steps.v3.outcome }}" >> results.csv

      - name: Checkout v4
        id: v4
        continue-on-error: true
        uses: actions/checkout@v4

      - name: Result v4
        if: always()
        run: echo "v4,${{ steps.v4.outcome }}" >> results.csv

      - name: Checkout v5
        id: v5
        continue-on-error: true
        uses: actions/checkout@v5

      - name: Result v5
        if: always()
        run: echo "v5,${{ steps.v5.outcome }}" >> results.csv

      - name: Checkout v6
        id: v6
        continue-on-error: true
        uses: actions/checkout@v6

      - name: Result v6
        if: always()
        run: echo "v6,${{ steps.v6.outcome }}" >> results.csv

      - name: Checkout v7
        id: v7
        continue-on-error: true
        uses: actions/checkout@v7

      - name: Result v7
        if: always()
        run: echo "v7,${{ steps.v7.outcome }}" >> results.csv

      - name: Print summary table
        if: always()
        run: |
          echo "## actions/checkout version test results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | Outcome |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|---------|" >> "$GITHUB_STEP_SUMMARY"
          while IFS=, read -r version outcome; do
            if [ "$outcome" == "success" ]; then
              icon="✅"
            else
              icon="❌"
            fi
            echo "| $version | $icon $outcome |" >> "$GITHUB_STEP_SUMMARY"
          done < results.csv
          cat results.csv

  test-v7-unsafe-opt-in:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout PR head (v7, allow-unsafe-pr-checkout)
        uses: actions/checkout@v7
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          allow-unsafe-pr-checkout: true
