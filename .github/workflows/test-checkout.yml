name: Try actions/checkout Versions (v1-v7) and Log to Main Repo

# pull_request_target runs with the base repo's context/token even for PRs
# from forks. This workflow only writes a log file back to the main repo's
# base branch — it never executes the fork's own code.
on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: write   # needed to commit/push the log file back to the repo

jobs:
  try-checkout-versions:
    # remove this line if you want this to run for same-repo PRs too
    if: github.event.pull_request.head.repo.fork == true
    runs-on: ubuntu-latest

    steps:
      # ---- Try each major version of actions/checkout itself ----
      - name: Try actions/checkout@v1
        id: checkout_v1
        continue-on-error: true
        uses: actions/checkout@v1

      - name: Try actions/checkout@v2
        id: checkout_v2
        continue-on-error: true
        uses: actions/checkout@v2

      - name: Try actions/checkout@v3
        id: checkout_v3
        continue-on-error: true
        uses: actions/checkout@v3

      - name: Try actions/checkout@v4
        id: checkout_v4
        continue-on-error: true
        uses: actions/checkout@v4

      - name: Try actions/checkout@v5
        id: checkout_v5
        continue-on-error: true
        uses: actions/checkout@v5

      - name: Try actions/checkout@v6
        id: checkout_v6
        continue-on-error: true
        uses: actions/checkout@v6

      - name: Try actions/checkout@v7
        id: checkout_v7
        continue-on-error: true
        uses: actions/checkout@v7

      # ---- Re-checkout base branch cleanly so we can write/commit the log ----
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build log from checkout version results
        id: build_log
        run: |
          mkdir -p logs
          LOGFILE="logs/checkout-version-log-pr${{ github.event.pull_request.number }}.txt"

          {
            echo "actions/checkout version test log"
            echo "PR: #${{ github.event.pull_request.number }} (${{ github.event.pull_request.title }})"
            echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo ""
            echo "[${{ steps.checkout_v1.outcome }}] actions/checkout@v1"
            echo "[${{ steps.checkout_v2.outcome }}] actions/checkout@v2"
            echo "[${{ steps.checkout_v3.outcome }}] actions/checkout@v3"
            echo "[${{ steps.checkout_v4.outcome }}] actions/checkout@v4"
            echo "[${{ steps.checkout_v5.outcome }}] actions/checkout@v5"
            echo "[${{ steps.checkout_v6.outcome }}] actions/checkout@v6"
            echo "[${{ steps.checkout_v7.outcome }}] actions/checkout@v7"
          } > "$LOGFILE"

          cat "$LOGFILE"
          echo "log_file=$LOGFILE" >> "$GITHUB_OUTPUT"

      - name: Commit and push log to main repository
        run: |
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          LOGFILE="${{ steps.build_log.outputs.log_file }}"

          git add "$LOGFILE"
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: checkout version test log for PR #${{ github.event.pull_request.number }}"
            git push origin "HEAD:$BASE_BRANCH"
          fi

      - name: Print summary
        if: always()
        run: cat "${{ steps.build_log.outputs.log_file }}" >> "$GITHUB_STEP_SUMMARY"
