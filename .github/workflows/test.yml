name: Change PR code

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: change-pr-code-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  change-code:
    # Only push to branches belonging to this repository.
    # Fork pull requests normally have a read-only token.
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false

    runs-on: ubuntu-latest

    steps:
      - name: Read checkout version from PR body
        id: checkout-version
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          match="$(
            printf '%s\n' "$PR_BODY" |
              grep -oE 'checkout@v[1-7]' |
              head -n 1 || true
          )"

          if [[ -z "$match" ]]; then
            echo "No checkout version found in the PR body."
            echo "Using checkout@v7 by default."
            version="v7"
          else
            version="${match#checkout@}"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Selected actions/checkout@$version"

      # The action version in `uses` must be written literally,
      # so each supported version has its own conditional step.

      - name: Checkout using v1
        if: steps.checkout-version.outputs.version == 'v1'
        uses: actions/checkout@v1
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Checkout using v2
        if: steps.checkout-version.outputs.version == 'v2'
        uses: actions/checkout@v2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Checkout using v3
        if: steps.checkout-version.outputs.version == 'v3'
        uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Checkout using v4
        if: steps.checkout-version.outputs.version == 'v4'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Checkout using v5
        if: steps.checkout-version.outputs.version == 'v5'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Checkout using v6
        if: steps.checkout-version.outputs.version == 'v6'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Checkout using v7
        if: steps.checkout-version.outputs.version == 'v7'
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Change code
        env:
          CHECKOUT_VERSION: ${{ steps.checkout-version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          # Replace this with the real code-changing command.
          #
          # Examples:
          # npm ci
          # npm run format
          #
          # python scripts/update_code.py

          printf 'actions/checkout@%s\n' \
            "$CHECKOUT_VERSION" > checkout-version.txt

      - name: Commit and push changes
        env:
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          CHECKOUT_VERSION: ${{ steps.checkout-version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add --all

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit \
            -m "chore: update code using checkout@${CHECKOUT_VERSION}"

          git push origin "HEAD:${PR_BRANCH}"
